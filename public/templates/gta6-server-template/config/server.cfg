# =========================================================================
#                     GTA VI / LEONIDA STATE SERVER CONFIG
#               Template Powered by GTA Money Team & Lux Automaton
# =========================================================================

# Only change the IP if you are running on a multi-homed server setup.
# otherwise, keep "0.0.0.0" to listen on all local interfaces.
endpoint_add_tcp "0.0.0.0:30120"
endpoint_add_udp "0.0.0.0:30120"

# --- Database Integration Configuration ---
# Modify this connection string with your MySQL/MariaDB database credentials.
# Format: mysql://db_user:REPLACE_WITH_DB_PASSWORD@host/database_name?charset=utf8mb4
set mysql_connection_string "mysql://db_user:REPLACE_WITH_DB_PASSWORD@localhost/gtavi_server?charset=utf8mb4"

# --- Core Resource Group Loads ---
# Ensure native modules and core systems load in chronological order.
ensure mapmanager
ensure chat
ensure spawnmanager
ensure sessionmanager
ensure basic-gamemode
ensure hardcap
ensure rconlog

# --- Custom GTA Money Team Core Scripts ---
ensure moneyteam-core

# --- Server Security & Performance Parameters ---
# Set the maximum slots (players) allowed concurrently.
# Free server keys support up to 48 players; custom tiers require licensing keys.
sv_maxclients 48

# Steam Web API Key: Recommended if you want to support Steam login links.
# Retrieve from: https://steamcommunity.com/dev/apikey
set steam_webApiKey "YOUR_STEAM_API_KEY_HERE"

# License Key: Paste your server license key generated via Keymaster here.
# Generate key at: https://keymaster.fivem.net/
sv_licenseKey "YOUR_LICENSE_KEY_HERE"

# --- Server Identity & Custom Branding ---
# Visible tags to filter the server in the public server lists.
sets tags "gta6, rp, legal, vice-city, money-team, legit"

# Set locale for localized search filters.
sets locale "en-US"

# Set a descriptive host name that details your community's name and gameplay style.
sv_hostname "GTA Money Team Roleplay | Legit Progression | Powered by Lux Automaton"

# Server Project Name and Description (shows in loading screens)
sets sv_projectName "GTA Money Team Server"
sets sv_projectDesc "Learn how to make money the legit way through advanced custom legal routes and playbooks."

# Server banner image URLs (Recommended size: 1920x440)
# sets banner_detail "https://url.to/image.png"
# sets banner_connecting "https://url.to/image.png"

# --- Administrative Permissions Configuration ---
# Add administrators using their license/discord identifiers.
# Syntax: add_ace group.<group_name> <permission_name> allow/deny
add_ace group.admin command allow # Allow all commands for administrators
add_ace group.admin command.quit deny # Deny console quit for security

# Add principal links to tie identifiers to groups.
add_principal identifier.fivem:12345 group.admin
add_principal identifier.discord:112233445566778899 group.admin
