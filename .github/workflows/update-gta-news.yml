name: Update GTA News Feed

on:
  schedule:
    - cron: '17 */8 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-gta-news
  cancel-in-progress: true

jobs:
  update-news:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Refresh GTA news feed
        run: npm run news:scrape

      - name: Commit refreshed feed
        run: |
          if git diff --quiet -- public/data/gta-news.json; then
            echo "No GTA news feed changes."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/gta-news.json
          git commit -m "Update GTA news feed"
          git push
